# Lab 2 Week 1 — four FastAPI services + MySQL (see docs/lab2-api-gap.md)
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yelp_db}
      MYSQL_USER: ${MYSQL_USER:-yelp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-yelppass}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  user-service:
    build:
      context: ./backend
      dockerfile: docker/user-service/Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-yelp}:${MYSQL_PASSWORD:-yelppass}@mysql:3306/${MYSQL_DATABASE:-yelp_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    ports:
      - "${USER_SERVICE_PORT:-8001}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      restaurant-service:
        condition: service_started

  owner-service:
    build:
      context: ./backend
      dockerfile: docker/owner-service/Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-yelp}:${MYSQL_PASSWORD:-yelppass}@mysql:3306/${MYSQL_DATABASE:-yelp_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    ports:
      - "${OWNER_SERVICE_PORT:-8002}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      restaurant-service:
        condition: service_started

  restaurant-service:
    build:
      context: ./backend
      dockerfile: docker/restaurant-service/Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-yelp}:${MYSQL_PASSWORD:-yelppass}@mysql:3306/${MYSQL_DATABASE:-yelp_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    ports:
      - "${RESTAURANT_SERVICE_PORT:-8003}:8000"
    volumes:
      - restaurant_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  review-service:
    build:
      context: ./backend
      dockerfile: docker/review-service/Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-yelp}:${MYSQL_PASSWORD:-yelppass}@mysql:3306/${MYSQL_DATABASE:-yelp_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    ports:
      - "${REVIEW_SERVICE_PORT:-8004}:8000"
    volumes:
      - review_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      restaurant-service:
        condition: service_started

volumes:
  mysql_data:
  restaurant_uploads:
  review_uploads:
