# One-shot Job: create application topics (safe to re-run with --if-not-exists).
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-create-topics
  namespace: yelp-lab2
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 20
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 90); do
                if nc -z kafka 9092; then echo "kafka:9092 up"; exit 0; fi
                echo "waiting for kafka..."; sleep 2;
              done
              exit 1
      containers:
        - name: create-topics
          image: apache/kafka:3.7.2
          command:
            - sh
            - -c
            - |
              set -e
              BOOT="kafka:9092"
              RF=1
              NP=3
              for T in review.created review.updated review.deleted \
                       restaurant.created restaurant.updated restaurant.claimed restaurant.deleted \
                       user.created user.updated; do
                /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
                  --bootstrap-server "$BOOT" --topic "$T" --replication-factor "$RF" --partitions "$NP"
              done
              echo "Topics:"
              /opt/kafka/bin/kafka-topics.sh --list --bootstrap-server "$BOOT"
